spring:
  application:
    name: firesafety # 프로젝트 이름

  config:
    import: optional:file:.env[.properties]

  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
  flyway:
    enabled: true
    locations: classpath:db/migration
  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

mybatis:
  configuration:
    map-underscore-to-camel-case: true
  mapper-locations: classpath:mapper/*/*.xml

constants:
  jwt:
    issuer: ${JWT_ISSUER}
    bearer-format: ${JWT_BEARER_FORMAT}
    claim-key: ${JWT_CLAIM_KEY}
    secret-key: ${JWT_SECRET_KEY}
    access-token-cookie-name: ${JWT_ACCESS_TOKEN_COOKIE_NAME}
    access-token-cookie-path: ${JWT_ACCESS_TOKEN_COOKIE_PATH}
    access-token-cookie-validity-seconds: ${JWT_ACCESS_TOKEN_COOKIE_VALIDITY_SECONDS}
    access-token-validity-milliseconds: ${JWT_ACCESS_TOKEN_VALIDITY_MILLISECONDS}
    refresh-token-cookie-name: ${JWT_REFRESH_TOKEN_COOKIE_NAME}
    refresh-token-cookie-path: ${JWT_REFRESH_TOKEN_COOKIE_PATH}
    refresh-token-cookie-validity-seconds: ${JWT_REFRESH_TOKEN_COOKIE_VALIDITY_SECONDS}
    refresh-token-validity-milliseconds: ${JWT_REFRESH_TOKEN_VALIDITY_MILLISECONDS}

  bootstrap:
    admin:
      enabled: ${BOOTSTRAP_SUPER_ADMIN_ENABLED:false}
      email: ${BOOTSTRAP_SUPER_ADMIN_EMAIL:}
      password: ${BOOTSTRAP_SUPER_ADMIN_PASSWORD:}
      name: ${BOOTSTRAP_SUPER_ADMIN_NAME:최고관리자}
      phone: ${BOOTSTRAP_SUPER_ADMIN_PHONE:}

  firebase:
    credentials-path: ${FIREBASE_CREDENTIALS_PATH:}

  password-reset:
    base-url: ${PASSWORD_RESET_BASE_URL:}
    token-expiration-minutes: ${PASSWORD_RESET_TOKEN_EXPIRATION_MINUTES:30}
    mail-from: ${MAIL_FROM:}
    rate-limit-window-minutes: ${PASSWORD_RESET_RATE_LIMIT_WINDOW_MINUTES:10}
    rate-limit-max-count: ${PASSWORD_RESET_RATE_LIMIT_MAX_COUNT:5}

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs
