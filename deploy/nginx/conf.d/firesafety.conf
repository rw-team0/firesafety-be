# =====================================================================
# 서버 1: 하드웨어 센서 데이터 수신 전용 (외부:22222 -> 여기, 규칙명 CSTECH_RECV_HTTP)
# 씨에스텍 디바이스는 구형 프로토콜(GET 쿼리스트링)이라 TLS를 못 다룰 가능성이 높아
# 이 포트는 평문 HTTP로 두고, 오직 /m_noUpload.php만 백엔드로 넘긴다.
#
# [선택지] 아래 두 방식 중 하나를 고른다.
#   A. (기본, 이 파일 그대로) nginx가 22222를 받아 /m_noUpload.php만 백엔드로 프록시,
#      그 외 경로는 전부 차단. 백엔드 로그/접근제어를 nginx 레벨에서 한 번 더 거를 수 있음.
#   B. docker-compose.yml에서 nginx의 22222 포트 매핑을 지우고 firesafety-backend에
#      "22222:8080"을 직접 매핑. 이 경우 아래 server 블록 전체를 안 씀(파일에서 제거).
# =====================================================================
server {
    listen 22222;
    server_name _;

    location /m_noUpload.php {
        proxy_pass http://firesafety-backend:8080/m_noUpload.php;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # 하드웨어 수신 경로 외에는 외부 노출 포트에서 아무 것도 안 받는다.
    location / {
        return 404;
    }
}

# =====================================================================
# 서버 2: 직원용 웹(프론트/관리자 API), 내부망(192.168.0.0/24)에서만 접속
# 외부 포트포워딩 대상이 아니므로 443은 방화벽 규칙과 무관하게 이 호스트 안에서만 열림.
# 원격/외부 접속이 필요해지면(TBD) 22222 하나로 합치는 방식(SNI 기반 분기 등)을 별도로 검토해야 함.
#
# 도메인 주소 미확정 -> server_name은 확정 전까지 플레이스홀더로 둔다.
# 인증서: 회사 와일드카드(*.rayworld.co.kr) 확인 중, 아니면 Let's Encrypt DNS-01로 발급 예정
# (80번을 못 열어서 HTTP-01 방식은 불가). 아래 ssl_certificate 경로는 실제 발급 후 채울 것.
# =====================================================================
server {
    listen 443 ssl;
    server_name firesafety.example.internal;  # TODO: 실제 도메인 확정되면 교체

    ssl_certificate     /etc/nginx/certs/fullchain.pem;   # TODO: 실제 인증서 파일 배치 후 확인
    ssl_certificate_key /etc/nginx/certs/privkey.pem;

    # 프론트엔드 정적 파일
    location / {
        proxy_pass http://firesafety-frontend:80;
        proxy_set_header Host $host;
    }

    # REST API
    location /api/ {
        proxy_pass http://firesafety-backend:8080/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # WebSocket(STOMP) 관제화면 실시간 채널
    location /ws/ {
        proxy_pass http://firesafety-backend:8080/ws/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
    }

    # Swagger UI (운영 노출 여부는 별도 결정 필요, 필요 없으면 이 블록 삭제)
    location /swagger-ui.html {
        proxy_pass http://firesafety-backend:8080/swagger-ui.html;
        proxy_set_header Host $host;
    }
    location /v3/api-docs {
        proxy_pass http://firesafety-backend:8080/v3/api-docs;
        proxy_set_header Host $host;
    }
}
