# firesafety 온프레미스 배포 초안
#
# 외부에서 열 수 있는 포트는 22222(CSTECH_RECV_HTTP) 하나뿐이다.
# /m_noUpload.php(하드웨어 수신)를 nginx 경유로 할지, 백엔드로 직접 매핑할지 미정이라
# 아래 nginx 서비스의 ports 주석에 두 가지 선택지를 남겨둔다. 실제 운영 전 하나를 선택할 것.
#
# 프론트엔드/AI 서비스는 별도 레포/이미지라 image 값이 placeholder다. 실제 이미지명/빌드 방식 확정 후 채울 것.
#
# 실행: docker compose --env-file .env.production up -d --build
# (--env-file을 꼭 지정해야 mysql 서비스의 ${DB_USERNAME} 등 치환값도 .env.production을 본다)

services:
  nginx:
    image: nginx:1.27-alpine
    container_name: firesafety-nginx
    ports:
      # [선택지 A - 기본] nginx가 22222를 받아서 경로별로 분기 (하드웨어 + 직원 웹 모두 이 컨테이너를 거침)
      - "22222:22222"
      # [선택지 B] 하드웨어 수신은 백엔드로 직접 매핑하고 싶다면 위 줄을 지우고
      # firesafety-backend 서비스의 ports에 "22222:8080"을 추가한 뒤, 아래 volumes의
      # conf.d에서 device-ingest 관련 server 블록을 빼고 staff-web(내부 전용)만 사용한다.
    volumes:
      - ./deploy/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./deploy/nginx/conf.d:/etc/nginx/conf.d:ro
      # 실제 인증서 파일은 이 디렉터리에 서버에서만 두고 Git에는 커밋하지 않는다.
      - ./deploy/nginx/certs:/etc/nginx/certs:ro
    depends_on:
      - firesafety-backend
      - firesafety-frontend
    networks:
      - firesafety-net
    restart: unless-stopped

  firesafety-backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: firesafety-backend
    env_file:
      - .env.production
    # FIREBASE_ENABLED=true로 켤 때만 필요. 실제 키 파일은 서버에 별도로 올려두고 경로만 맞춘다 (Git 커밋 금지).
    # volumes:
    #   - /home/firesafety/secrets/firebase-credentials.json:/app/secrets/firebase-credentials.json:ro
    # 외부 포트 매핑 없음 (nginx를 통해서만 접근). 선택지 B를 쓰는 경우에만 ports 추가.
    depends_on:
      - mysql
    networks:
      - firesafety-net
    restart: unless-stopped

  firesafety-frontend:
    # TODO: 프론트엔드(Vue) 레포 빌드 산출물 이미지. 이미지명/빌드 컨텍스트는 프론트 배포 방식 확정 후 채운다.
    image: firesafety-frontend:latest
    container_name: firesafety-frontend
    networks:
      - firesafety-net
    restart: unless-stopped

  ai-service:
    # TODO: Python AI 정상/아크 분류 서비스. 이미지명은 AI 서버 레포 확정 후 채운다.
    image: firesafety-ai-service:latest
    container_name: firesafety-ai-service
    env_file:
      - .env.production
    # 외부 노출 없음. backend가 내부 네트워크(firesafety-net)로만 호출한다.
    # AI_PREDICTION_BASE_URL=http://ai-service:8000 형태로 .env.production에 설정할 것.
    networks:
      - firesafety-net
    restart: unless-stopped

  mysql:
    image: mysql:8.0
    container_name: firesafety-mysql
    environment:
      MYSQL_DATABASE: firesafety
      MYSQL_USER: ${DB_USERNAME}
      MYSQL_PASSWORD: ${DB_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
    volumes:
      - mysql-data:/var/lib/mysql
    # 외부 포트 매핑 없음. backend만 내부 네트워크로 접근.
    networks:
      - firesafety-net
    restart: unless-stopped

networks:
  firesafety-net:
    driver: bridge

volumes:
  mysql-data:
